<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeTwitter</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        
        <!--LEFT SIDEBAR - Navigation -->
        <nav class="sidebar" role="navigation" aria-label="Main navigation">
            <div class="logo">
                <i class="fa-brands fa-twitter"></i>
            </div>
            
            <ul class="nav-links">
                <li class="active" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </li>
                <li data-page="explore">
                    <i class="fas fa-hashtag"></i>
                    <span>Explore</span>
                </li>
                <li data-page="notifications">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </li>
                <li data-page="messages">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </li>
                <li data-page="bookmarks">
                    <i class="fas fa-bookmark"></i>
                    <span>Bookmarks</span>
                </li>
                <li data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </li>
                <li data-page="more">
                    <i class="fas fa-ellipsis-h"></i>
                    <span>More</span>
                </li>
            </ul>
            
            <button class="tweet-btn" id="sidebarTweetBtn">
                <i class="fas fa-feather-alt"></i>
                <span>Tweet</span>
            </button>
        </nav>

        <!--MAIN FEED -->
        <main class="feed" role="main">
            <!-- Feed Header -->
            <header class="feed-header">
                <h2>Home</h2>
                <i class="fas fa-sparkles" style="color: var(--primary);"></i>
            </header>
            
            <!-- Tweet Box -->
            <div class="tweet-box">
                <div class="tweet-box-header">
                    <img src="https://ui-avatars.com/api/?name=You&background=1DA1F2&color=fff&size=48" 
                         alt="Your avatar" 
                         class="avatar">
                    <textarea 
                        id="tweetTextarea" 
                        placeholder="What's happening?" 
                        rows="2"
                        maxlength="280"
                        aria-label="Compose new tweet"
                    ></textarea>
                </div>
                
                <div class="tweet-actions">
                    <div class="action-icons">
                        <i class="fas fa-image" title="Media"></i>
                        <i class="fas fa-gif" title="GIF"></i>
                        <i class="fas fa-poll" title="Poll"></i>
                        <i class="fas fa-smile" title="Emoji"></i>
                        <i class="fas fa-calendar-alt" title="Schedule"></i>
                    </div>
                    <div class="tweet-actions-right">
                        <span class="char-count" id="charCount">280</span>
                        <button class="tweet-btn" id="postTweetBtn">
                            Tweet
                        </button>
                    </div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="timeline" id="timeline">
                <!-- Tweets will be rendered by JavaScript -->
            </div>
        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="right-sidebar" role="complementary">
            <!-- Search Box -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search Twitter" id="searchInput" aria-label="Search Twitter">
            </div>
            
            <!-- Trending Section -->
            <div class="trending" id="trendingContainer">
                <h3> What's happening</h3>
                <!-- Trending items loaded by JavaScript -->
            </div>
            
            <!-- Footer Links -->
            <div class="footer-links">
                <a href="#">Terms of Service</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Cookie Policy</a>
                <span>© 2026 FakeTwitter</span>
            </div>
        </aside>
    </div>

    <!-- JavaScript -->
    <script src="../js/app.js"></script>
</body>
</html>
